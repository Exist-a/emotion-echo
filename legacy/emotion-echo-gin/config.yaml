server:
  port: 18080
  mode: debug
  read_timeout: 30
  write_timeout: 30
database:
  postgres:
    host: localhost
    port: 5432
    user: postgres
    password: ''
    dbname: emotion_echo
    sslmode: disable
    max_open_conns: 25
    max_idle_conns: 5
  redis:
    host: localhost
    port: 6379
    password: ''
    db: 0
jwt:
  secret: dev-only-secret-do-not-use-in-prod
  access_token_expire: 15
  refresh_token_expire: 168
ai:
  provider: local
  local:
    base_url: http://localhost:8000
    timeout: 60
  asr:
    enabled: false
    base_url: http://localhost:8001
    model: Qwen/Qwen3-ASR-1.7B
  emotion:
    enabled: false
    base_url: http://localhost:8002
  kimi:
    api_key: sk-dummy-dev-key-for-local-only
    base_url: https://api.moonshot.cn/v1
    model: moonshot-v1-8k
oauth:
  wechat_app_id: ''
  wechat_app_secret: ''
  wechat_redirect_uri: http://localhost:3000/auth/callback
storage:
  type: local
  local:
    path: ./uploads
    base_url: http://localhost:8080/uploads
  oss:
    endpoint: ''
    access_key_id: ''
    access_key_secret: ''
    bucket: ''
    region: ''
rate_limit:
  enabled: true
  requests_per_second: 50
  burst: 100
log:
  level: info
  format: text
  output: stdout
analysis:
  enabled: false
  cron_schedule: 0 3 * * *
  threshold_messages: 20
  timeout_minutes: 30
