Name: emotion-echo-user-svc
Host: 0.0.0.0
Port: 8888

# Stage 26-P:容器内服务发现(env 占位)
SkyWalking:
  OAPAddr:     ${SKYWALKING_OAP_ADDR:-emotion-echo-sw-oap:11800}
  ServiceName: emotion-echo-user-svc
  Enabled:     true

Postgres:
  DSN:          ${POSTGRES_DSN:-"host=emotion-echo-postgres port=5432 user=postgres password=postgres dbname=emotion_echo sslmode=disable search_path=emotion_echo_user"}
  MaxOpenConns: 10
  MaxIdleConns: 5
