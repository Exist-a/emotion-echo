version: "3.8"

# Note (2026-07-17): Emotion-Echo-Gin 单体后端已迁移到 legacy/emotion-echo-gin/，
# 当前仓库的微服务后端为 emotion-echo-{user,chat,analytics,assessment}-svc（无 Dockerfile）。
# 本 compose 文件中的 `backend` 服务已停止使用，仅作历史参考；
# 实际启动请参考 deploy/docker-compose.infra.yml（基础设施）+ deploy/docker-compose.apps.yml（业务）。
# 如需重新启用单体后端，请将 context 指向 legacy/emotion-echo-gin 并自行维护。

services:
  postgres:
    image: postgres:18-alpine
    container_name: emotion-echo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ""
      POSTGRES_DB: emotion_echo
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    container_name: emotion-echo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  sensevoice:
    build:
      context: ./Emotion-Echo-LLM/sensevoice-small
      dockerfile: Dockerfile
    container_name: emotion-echo-sensevoice
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - sensevoice_models:/root/.cache/modelscope
    networks:
      - app-network
    deploy:
      resources:
        reservations:
          memory: 4G

  xtts:
    build:
      context: ./Emotion-Echo-LLM/XTTS
      dockerfile: Dockerfile
    container_name: emotion-echo-xtts
    restart: unless-stopped
    ports:
      - "8003:8003"
    volumes:
      - ./Emotion-Echo-LLM/XTTS/AI-ModelScope:/app/AI-ModelScope
      - xtts_cache:/root/.cache/modelscope
    networks:
      - app-network
    deploy:
      resources:
        reservations:
          memory: 8G

  # backend: 单体后端已弃用，保留注释作为历史参考。
  # 启用请取消注释并将 context 改为 ./legacy/emotion-echo-gin
  #
  # backend:
  #   build:
  #     context: ./legacy/emotion-echo-gin
  #     dockerfile: Dockerfile
  #   container_name: emotion-echo-backend
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     - EE_DATABASE_POSTGRES_HOST=postgres
  #     - EE_DATABASE_POSTGRES_PORT=5432
  #     - EE_DATABASE_POSTGRES_USER=postgres
  #     - EE_DATABASE_POSTGRES_PASSWORD=
  #     - EE_DATABASE_POSTGRES_DBNAME=emotion_echo
  #     - EE_DATABASE_REDIS_HOST=redis
  #     - EE_DATABASE_REDIS_PORT=6379
  #     - EE_DATABASE_REDIS_PASSWORD=
  #   volumes:
  #     - ./uploads:/root/uploads
  #   networks:
  #     - app-network

  frontend:
    build:
      context: ./Emotion-Echo-Web
      dockerfile: Dockerfile
    container_name: emotion-echo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Stage 26-P: backend (Emotion-Echo-Gin) 已退役;
    # 前端真实后端是 4 Go svc + ai-svc + llm-service,通过 APISIX :9080 入口访问
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:9080
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  sensevoice_models:
  xtts_cache:

networks:
  app-network:
    driver: bridge
