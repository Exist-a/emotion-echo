apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ include "prometheus.namespaceObservability" . }}
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    {{- include "prometheus.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port | default 9090 }}
      targetPort: http
      protocol: TCP