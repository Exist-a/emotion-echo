# values.yaml — Stage 28-A GREEN
# Minimal defaults; everything overrideable from umbrella values.
image:
  repository: prom/prometheus
  tag: v2.54.0
  pullPolicy: IfNotPresent

# Prometheus server config flags.
# Retention is intentionally short for dev (1d) to keep kind disk usage down.
retention: 1d
scrapeInterval: 30s
evaluationInterval: 30s

service:
  type: ClusterIP
  port: 9090

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""           # empty = use cluster default (kind standard)
  accessModes:
    - ReadWriteOnce

# ServiceAccount name (used in deployment.yaml and rbac.yaml).
serviceAccount:
  create: true
  name: prometheus