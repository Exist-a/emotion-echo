oap:
  image:
    repository: apache/skywalking-oap-server
    tag: 9.7.0
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    grpcPort: 11800
    restPort: 12800
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    size: 5Gi
ui:
  image:
    repository: apache/skywalking-ui
    tag: 9.7.0
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi