apiVersion: apps/v1
kind: Deployment
metadata:
  name: skywalking-ui
  namespace: ee-data
  labels:
    {{- include "skywalking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      {{- include "skywalking.uiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "skywalking.uiSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          env:
            - name: SW_OAP_ADDRESS
              value: http://skywalking-oap:12800
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: {{ .Values.ui.service.port }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.ui.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: skywalking-ui
  namespace: ee-data
  labels:
    {{- include "skywalking.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.ui.service.port }}
      targetPort: {{ .Values.ui.service.port }}
  selector:
    {{- include "skywalking.uiSelectorLabels" . | nindent 4 }}