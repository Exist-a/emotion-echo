{{- /*
  cert-manager controller — Deployment.

  Reconsciles Certificate, Issuer, ClusterIssuer, and CertificateRequest
  objects. Without this pod, no Certificate will ever reach Ready.

  Image: rendered via the umbrella `emotion-echo.image` helper when
  global.image.registry is set; otherwise the per-component
  image.repository is used directly (the helper falls through to
  repository:tag).
*/ -}}
{{- if .Values.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cert-manager.fullname" . }}-controller
  namespace: {{ include "cert-manager.namespace" . }}
  labels:
    {{- include "cert-manager.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "cert-manager.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "cert-manager.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "cert-manager.fullname" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: {{ printf "%s%s:%s" (ternary (printf "%s/" .Values.image.registry) "" (empty .Values.image.registry)) .Values.controller.image.repository .Values.controller.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- range .Values.controller.args }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
{{- end }}