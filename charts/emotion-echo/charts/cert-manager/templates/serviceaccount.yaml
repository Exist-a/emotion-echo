{{- /*
  Single ServiceAccount shared by controller, webhook, and cainjector.
  Upstream cert-manager also uses one SA across all three; we mirror
  that to avoid a proliferation of ClusterRoleBindings.

  Namespace: explicit (not .Release.Namespace). All three workloads
  live in the chart-managed `cert-manager` namespace.
*/ -}}
{{- if .Values.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cert-manager.fullname" . }}
  namespace: {{ include "cert-manager.namespace" . }}
  labels:
    {{- include "cert-manager.labels" . | nindent 4 }}
{{- end }}