apiVersion: v1
kind: Service
metadata:
  name: chat-svc
  namespace: ee-app
  labels:
    {{- include "chat-svc.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    {{- include "chat-svc.selectorLabels" . | nindent 4 }}