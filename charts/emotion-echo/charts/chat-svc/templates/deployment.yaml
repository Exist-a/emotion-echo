apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-svc
  namespace: ee-app
  labels:
    {{- include "chat-svc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "chat-svc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chat-svc.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      containers:
        - name: chat-svc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: chat-svc-secret
                  key: postgresDsn
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka-headless.ee-data.svc.cluster.local:9092"
            - name: SKYWALKING_OAP_ADDR
              value: "skywalking-oap.ee-data:11800"
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: INFO
            - name: TZ
              value: Asia/Shanghai
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}