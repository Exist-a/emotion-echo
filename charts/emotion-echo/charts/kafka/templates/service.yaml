apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: ee-data
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    {{- include "kafka.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: ee-data
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
    - port: 9093
      targetPort: 9093
  selector:
    {{- include "kafka.selectorLabels" . | nindent 4 }}