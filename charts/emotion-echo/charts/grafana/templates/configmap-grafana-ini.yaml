apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: {{ include "grafana.namespaceObservability" . }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  grafana.ini: |
    [server]
    http_port = 3000
    domain = grafana.ee-observability.svc.cluster.local
    root_url = http://grafana.ee-observability.svc.cluster.local:3000

    [security]
    admin_user = __admin__
    admin_password = __admin__

    [paths]
    data = /var/lib/grafana
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning

    [log]
    mode = console
    level = info

    [users]
    allow_sign_up = false