apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: ee-system
  labels:
    {{- include "etcd.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.service.clientPort }}
      targetPort: {{ .Values.service.clientPort }}
  selector:
    {{- include "etcd.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-headless
  namespace: ee-system
  labels:
    {{- include "etcd.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.clientPort }}
      targetPort: {{ .Values.service.clientPort }}
    - port: {{ .Values.service.peerPort }}
      targetPort: {{ .Values.service.peerPort }}
  selector:
    {{- include "etcd.selectorLabels" . | nindent 4 }}