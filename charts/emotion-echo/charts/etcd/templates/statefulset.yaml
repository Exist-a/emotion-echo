apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: ee-system
  labels:
    {{- include "etcd.labels" . | nindent 4 }}
spec:
  serviceName: etcd-headless
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "etcd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "etcd.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: etcd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "etcd"
            - "--listen-client-urls=http://0.0.0.0:2379"
            - "--advertise-client-urls=http://etcd-0.etcd-headless.ee-system.svc.cluster.local:2379"
            - "--listen-peer-urls=http://0.0.0.0:2380"
            - "--initial-advertise-peer-urls=http://etcd-0.etcd-headless.ee-system.svc.cluster.local:2380"
            - "--initial-cluster=default=http://etcd-0.etcd-headless.ee-system.svc.cluster.local:2380"
          ports:
            - containerPort: {{ .Values.service.clientPort }}
            - containerPort: {{ .Values.service.peerPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /etcd-data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.size }}