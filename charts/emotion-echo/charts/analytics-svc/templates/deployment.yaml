apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-svc
  namespace: ee-app
  labels:
    {{- include "analytics-svc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "analytics-svc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "analytics-svc.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      containers:
        - name: analytics-svc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: analytics-svc-secret
                  key: postgresDsn
            - name: SKYWALKING_OAP_ADDR
              value: "skywalking-oap.ee-data:11800"
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: INFO
            - name: TZ
              value: Asia/Shanghai
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-svc
  namespace: ee-app
  labels:
    {{- include "analytics-svc.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    {{- include "analytics-svc.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-svc-config
  namespace: ee-app
  labels:
    {{- include "analytics-svc.labels" . | nindent 4 }}
data:
  analytics-api.yaml: |
    Name: analytics-api
    Host: 0.0.0.0
    Port: 8893
    Log:
      Mode: json
      Level: info
---
apiVersion: v1
kind: Secret
metadata:
  name: analytics-svc-secret
  namespace: ee-app
  labels:
    {{- include "analytics-svc.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgresDsn: "host=postgres.ee-data port=5432 user=postgres password=postgres dbname=emotion_echo sslmode=disable search_path=emotion_echo_analytics"