apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-svc
  namespace: ee-app
  labels:
    {{- include "ai-svc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "ai-svc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-svc.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.httpPort }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      containers:
        - name: ai-svc
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: ai-svc-secret
                  key: postgresDsn
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka-headless.ee-data.svc.cluster.local:9092"
            - name: SKYWALKING_OAP_ADDR
              value: "skywalking-oap.ee-data:11800"
            - name: LLM_BASE_URL
              value: "http://llm-service.ee-app:8000"
            - name: LLM_GRPC_ADDR
              value: "llm-service.ee-app:50051"
            - name: LLM_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-service-secret
                  key: internalApiKey
            - name: FER_BASE_URL
              value: "http://fer.ee-app:8004"
            - name: SENSEVOICE_BASE_URL
              value: "http://sensevoice.ee-app:8002"
            - name: XTTS_BASE_URL
              value: "http://xtts.ee-app:8003"
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: INFO
            - name: GIN_MODE
              value: release
            - name: TZ
              value: Asia/Shanghai
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tls
              mountPath: /app/etc/tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tls
          secret:
            secretName: ai-svc-tls
---
apiVersion: v1
kind: Service
metadata:
  name: ai-svc
  namespace: ee-app
  labels:
    {{- include "ai-svc.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
  selector:
    {{- include "ai-svc.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-svc-config
  namespace: ee-app
  labels:
    {{- include "ai-svc.labels" . | nindent 4 }}
data:
  ai-api.yaml: |
    Name: ai-api
    Host: 0.0.0.0
    Port: 8891
    GRPC:
      Enabled: true
      Port: 8892
    Log:
      Mode: json
      Level: info
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-svc-secret
  namespace: ee-app
  labels:
    {{- include "ai-svc.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgresDsn: "host=postgres.ee-data port=5432 user=postgres password=postgres dbname=emotion_echo sslmode=disable search_path=emotion_echo_ai"
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-svc-tls
  namespace: ee-app
  labels:
    {{- include "ai-svc.labels" . | nindent 4 }}
type: kubernetes.io/tls
stringData:
  tls.crt: "REPLACE_WITH_ai-client.crt"
  tls.key: "REPLACE_WITH_ai-client.key"
  ca.crt: "REPLACE_WITH_ca.crt"