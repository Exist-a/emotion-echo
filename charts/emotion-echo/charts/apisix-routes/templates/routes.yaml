# 16 ApisixRoute CRDs - transcribed from deploy/apisix/apisix.yaml 1:1.
# Field semantics map directly to APISIX etcd JSON schema.
{{- $upstreamUser := "user-svc" }}
{{- $upstreamChat := "chat-svc" }}
{{- $upstreamAnalytics := "analytics-svc" }}
{{- $upstreamAssessment := "assessment-svc" }}
{{- $upstreamAi := "ai-svc" }}
{{- $upstreamMockPing := "mock-ping" }}

{{- /* Route 1: r-user-me */ -}}
---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: r-user-me
  namespace: ee-app
spec:
  http:
    - name: user-me
      match:
        paths: ["/api/v1/users/me"]
        methods: ["GET"]
      backends:
        - serviceName: {{ $upstreamUser }}
          servicePort: 8888

