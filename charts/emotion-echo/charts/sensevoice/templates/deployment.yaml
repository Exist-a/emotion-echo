apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensevoice
  namespace: ee-app
  labels:
    {{- include "sensevoice.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "sensevoice.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sensevoice.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      containers:
        - name: sensevoice
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: INFO
            - name: SENSEVOICE_DEVICE
              value: cpu
            - name: TZ
              value: Asia/Shanghai
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 60
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          persistentVolumeClaim:
            claimName: sensevoice-cache
---
apiVersion: v1
kind: Service
metadata:
  name: sensevoice
  namespace: ee-app
  labels:
    {{- include "sensevoice.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    {{- include "sensevoice.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sensevoice-cache
  namespace: ee-app
  labels:
    {{- include "sensevoice.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}