apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: ee-app
  labels:
    {{- include "llm-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "llm-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-service.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.httpPort }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      containers:
        - name: llm-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
          env:
            - name: HTTP_PORT
              value: "{{ .Values.service.httpPort }}"
            - name: GRPC_PORT
              value: "{{ .Values.service.grpcPort }}"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-service-secret
                  key: internalApiKey
            - name: INTERNAL_API_KEY_REQUIRED
              value: "0"
            - name: TLS_ENABLED
              value: "1"
            - name: TLS_CA_CERT
              value: "/app/etc/tls/ca.crt"
            - name: TLS_SERVER_CERT
              value: "/app/etc/tls/llm-server.crt"
            - name: TLS_SERVER_KEY
              value: "/app/etc/tls/llm-server.key"
            - name: TLS_REQUIRE_CLIENT_AUTH
              value: "1"
            - name: LOG_FORMAT
              value: json
            - name: LOG_LEVEL
              value: INFO
            - name: TZ
              value: Asia/Shanghai
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tls
              mountPath: /app/etc/tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tls
          secret:
            secretName: llm-service-tls
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: ee-app
  labels:
    {{- include "llm-service.labels" . | nindent 4 }}
spec:
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
  selector:
    {{- include "llm-service.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-service-secret
  namespace: ee-app
  labels:
    {{- include "llm-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  internalApiKey: {{- if and .Values.global .Values.global.secrets .Values.global.secrets.internalApiKey }}{{ .Values.global.secrets.internalApiKey }}{{- else }}dev-key-change-me-please-32chars-min{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-service-tls
  namespace: ee-app
  labels:
    {{- include "llm-service.labels" . | nindent 4 }}
type: kubernetes.io/tls
stringData:
  tls.crt: "REPLACE_WITH_llm-server.crt"
  tls.key: "REPLACE_WITH_llm-server.key"
  ca.crt: "REPLACE_WITH_ca.crt"