apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix-gateway
  namespace: ee-system
  labels:
    {{- include "apisix-ingress.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "apisix-ingress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "apisix-ingress.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
      containers:
        - name: apisix
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: gateway
              containerPort: {{ .Values.service.gatewayPort }}
            - name: admin
              containerPort: {{ .Values.service.adminPort }}
          env:
            - name: TZ
              value: Asia/Shanghai
          volumeMounts:
            - name: config
              mountPath: /usr/local/apisix/conf/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: gateway
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: apisix-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: apisix-gateway
  namespace: ee-system
  labels:
    {{- include "apisix-ingress.labels" . | nindent 4 }}
spec:
  ports:
    - name: gateway
      port: {{ .Values.service.gatewayPort }}
      targetPort: gateway
    - name: admin
      port: {{ .Values.service.adminPort }}
      targetPort: admin
  selector:
    {{- include "apisix-ingress.selectorLabels" . | nindent 4 }}