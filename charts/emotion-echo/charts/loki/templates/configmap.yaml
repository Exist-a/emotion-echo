apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ include "loki.namespaceObservability" . }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
data:
  # Minimal Loki 3.x config. Single-node mode; filesystem backend.
  # Multi-tenant is enabled but disabled-by-default to keep dev simple.
  loki.yml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      log_level: info
      grpc_listen_port: 9096

    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/tsdb-index
        cache_location: /loki/tsdb-cache
      filesystem:
        directory: /loki/chunks

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
      delete_request_store: filesystem

    limits_config:
      retention_period: {{ .Values.retention | default "744h" }}
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      max_entries_limit_per_query: 5000

    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100