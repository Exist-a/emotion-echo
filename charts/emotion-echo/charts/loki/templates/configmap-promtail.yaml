apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: {{ include "loki.namespaceObservability" . }}
  labels:
    {{- include "loki.promtailLabels" . | nindent 4 }}
data:
  # Minimal Promtail config: scrape every Pod's stdout/stderr via the
  # Kubernetes service account, label by namespace + pod, push to loki:3100.
  promtail.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: info

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.{{ include "loki.namespaceObservability" . }}.svc.cluster.local:3100/loki/api/v1/push
        batchwait: 1s
        batchsize: 1048576

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: (.+)
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
        pipeline_stages:
          - docker: {}