apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: {{ include "loki.namespaceObservability" . }}
  labels:
    {{- include "loki.promtailLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "loki.promtailSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "loki.promtailSelectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: promtail
          image: "{{ .Values.promtail.image.repository }}:{{ .Values.promtail.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.promtail.image.pullPolicy | default "IfNotPresent" }}
          args:
            - -config.file=/etc/promtail/promtail.yml
          ports:
            - name: http
              containerPort: 9080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: positions
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: containers
          hostPath:
            path: /var/log/containers
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: positions
          emptyDir: {}