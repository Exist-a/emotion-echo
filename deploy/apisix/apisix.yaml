# =====================================================
#  APISIX 路由设计文档 (Stage 26-P · Commit P5)
#
#  APISIX 3.9 standalone 模式 (role: control_plane + config_provider: yaml)
#  在 apache/apisix:3.9.0-debian 镜像里被 enum 校验拒绝 —
#  "property config_provider validation failed: matches none of the enum values"。
#  因而下调回到 traditional + config_provider: etcd,启动后用
#  deploy/apisix/seed.sh 把本文件的 6 upstream + 16 route 推入 etcd。
#
#  本文件保留作为单一可信源(seed.sh 推送的内容就是这里的 6 + 16);
#  字段命名跟 etcd JSON 端一致,seed.sh 直接搬过来。
# =====================================================

# ---------- Upstream 6 ----------
# 1. user-svc        -> emotion-echo-user-svc:8888
# 2. chat-svc        -> emotion-echo-chat-svc:8890
# 3. analytics-svc   -> emotion-echo-analytics-svc:8893   (避开 ai-svc 8892)
# 4. assessment-svc  -> emotion-echo-assessment-svc:8889
# 5. ai-svc          -> emotion-echo-ai-svc:8891 (HTTP)
# 6. mock-ping       -> 127.0.0.1:1980 (APISIX 自检)

# ---------- Route 16 ----------
# user-svc (id 1-3):
#   r-user-me            GET    /api/v1/users/me
#   r-user-by-id         GET    /api/v1/users/:id
#   r-user-update        PATCH  /api/v1/users/me
# chat-svc (id 4-6):
#   r-conv-create        POST   /api/v1/conversations
#   r-msg-list           GET    /api/v1/conversations/*/messages
#   r-msg-send           POST   /api/v1/conversations/*/messages
# analytics-svc (id 7):
#   r-analytics-health   GET    /analytics-health
# assessment-svc (id 8-12):
#   r-surveys                  GET    /api/v1/surveys
#   r-survey-get               GET    /api/v1/surveys/*
#   r-survey-submit            POST   /api/v1/surveys/*/submit
#   r-survey-results-list      GET    /api/v1/surveys/results
#   r-survey-results-get       GET    /api/v1/surveys/results/*
# ai-svc (id 13-15):
#   r-emotion-by-msg     GET    /api/v1/emotion/message/*
#   r-emotion-by-conv    GET    /api/v1/emotion/conversation/*
#   r-ai-health          GET    /ai-health
# mock-ping (id 16):
#   r-ping               GET    /ping

# 真实的 PUT /upstreams/N + /routes/N 在 deploy/apisix/seed.sh
