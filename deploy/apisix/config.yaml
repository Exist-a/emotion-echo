# =====================================================
#  APISIX 启动配置 (Stage 26-P · Commit P5)
#  改用 standalone 模式,启动时直接加载 apisix.yaml (6 upstream / 14+ route)
#  不再依赖 etcd 推送
# =====================================================

deployment:
  role: control_plane
  role_control_plane:
    config_provider: yaml
  admin:
    admin_key_required: true
    admin_key:
      - name: admin
        key: "edd1c9f034335f136f87ad84b625c8f1"
        role: admin
    allow_admin:
      - 127.0.0.0/24
      - 0.0.0.0/0
    admin_listen:
      ip: 0.0.0.0
      port: 9180
