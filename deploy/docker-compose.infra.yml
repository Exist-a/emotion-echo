# =====================================================
#  Emotion-Echo 基础设施编排 (Stage 20-P0 + Stage 26-Q nginx 替代 APISIX)
#  启动：docker-compose -f deploy/docker-compose.infra.yml up -d
#  注意：业务应用在 deploy/docker-compose.apps.yml
# =====================================================

x-logging-env: &logging-env
  TZ: Asia/Shanghai

services:

  # =====================================================
  # postgres:15 (trust 模式 — 仅 dev)
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: emotion-echo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: emotion_echo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/01-create-schemas.sql:/docker-entrypoint-initdb.d/01-create-schemas.sql:ro
      - ./db/02-create-tables-in-schemas.sql:/docker-entrypoint-initdb.d/02-create-tables-in-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # redis:7
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: emotion-echo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # =====================================================
  # Stage 26-Q · APISIX 3.9 保留(无 image 升级/Docker Hub 受限)
  # Stage 26-P 实测:APISIX 3.9.0-debian 镜像无论配置 (关 SSL / 关
  # redirect plugin / 挂 self-signed cert) 都会触发 nginx openresty
  # 内部 `return 301 about:blank`,这是 apache/apisix:3.9 已知 bug。
  #
  # Stage 26-Q 解:前端走直连 4 Go svc (绕过 :9080), :9080 的实际路由
  # 不再作为 dev 链路必经。Compose 仍保留 apache/apisix 容器与 admin
  # 端口,因为 ai-svc / llm-service / external system 可能需要.
  # 升级到 apache/apisix:3.10+ 修此 bug 留给 Stage 27。
  # =====================================================
  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: emotion-echo-apisix
    ports:
      - "9080:9080"
      - "9091:9091"
      - "9180:9180"
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./tls/cert:/usr/local/apisix/cert:ro
    networks:
      - app-network
    restart: unless-stopped

  # etcd (APISIX 配置存储) — Stage 26-Q 已不再被 gateway 消费,
  # 保留以兼容 ai-svc 等仍用 etcd 的 svc
  # =====================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: emotion-echo-etcd
    command:
      - "etcd"
      - "--listen-client-urls=http://0.0.0.0:2379"
      - "--advertise-client-urls=http://etcd:2379"
      - "--listen-peer-urls=http://0.0.0.0:2380"
      - "--initial-advertise-peer-urls=http://etcd:2380"
      - "--initial-cluster=default=http://etcd:2380"
    ports:
      - "2379:2379"
      - "2380:2380"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # kafka 3.7 (KRaft 模式, 无 Zookeeper)
  # =====================================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: emotion-echo-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_PROCESS_CONFIGS_TTL: 30000
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # =====================================================
  # SkyWalking OAP (后端)
  # =====================================================
  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: emotion-echo-sw-oap
    restart: unless-stopped
    environment:
      SW_STORAGE: h2
      SW_JDBC_URL: jdbc:h2:mem:skywalking-oap-db;DB_CLOSE_DELAY=-1
      TZ: Asia/Shanghai
    ports:
      - "11800:11800"
      - "12800:12800"
    networks:
      - app-network

  # =====================================================
  # SkyWalking UI (前端)
  # =====================================================
  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: emotion-echo-sw-ui
    restart: unless-stopped
    depends_on:
      - skywalking-oap
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
      TZ: Asia/Shanghai
    ports:
      - "18080:8080"

# =====================================================
# 卷定义
# =====================================================
volumes:
  postgres_data:
  redis_data:
  kafka_data:

# =====================================================
# 网络定义 (Stage 26-Q:external, 与 apps.yml 共享 emotion-echo_app-network)
# =====================================================
networks:
  app-network:
    external: true
    name: emotion-echo_app-network
